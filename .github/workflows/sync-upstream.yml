name: Sync upstream

on:
  schedule:
    # 03:17 Asia/Ho_Chi_Minh = 20:17 UTC hôm trước
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fork này có 1 commit riêng (file workflow này) nên không thể fast-forward.
          # Dùng merge -X ours: áp dụng hết changes của upstream, chỉ giữ file workflow nếu conflict.
          BRANCH="${{ github.event.repository.default_branch }}"
          UPSTREAM=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.parent.full_name')
          git remote add upstream "https://github.com/$UPSTREAM.git"
          git fetch upstream "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git merge "upstream/$BRANCH" --no-edit -X ours; then
            git push origin "$BRANCH"
            echo "sync ok"
          else
            echo "merge failed"
            exit 1
          fi
